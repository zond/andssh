name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Leave empty to only build.'
        required: false
        default: ''

permissions:
  contents: write

env:
  # Force JS-based actions to run on Node 24 so we don't rely on the
  # deprecated Node 20 runtime. Lets each action stay on its current
  # stable major without a version bump. Remove once Node 24 is default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        id: rename
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          OUT="dist/andssh-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: andssh-${{ steps.rename.outputs.version }}
          path: ${{ steps.rename.outputs.apk }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true
