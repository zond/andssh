name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Leave empty to only build.'
        required: false
        default: ''

permissions:
  contents: write

env:
  # Force JS-based actions to run on Node 24 so we don't rely on the
  # deprecated Node 20 runtime. Lets each action stay on its current
  # stable major without a version bump. Remove once Node 24 is default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Reconstruct release signing material
        # Decodes the base64 keystore into android/app/upload-keystore.jks
        # and writes android/key.properties from the other three secrets.
        # If the keystore secret isn't configured we skip and let
        # android/app/build.gradle.kts fall back to the default debug
        # keystore (APK is then not distributable, but the build still
        # runs — useful for testing the workflow itself).
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 configured; build will use the debug keystore."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        id: rename
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="dev-${GITHUB_SHA::7}"
          fi
          OUT="dist/andssh-${VERSION}.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$OUT"
          echo "apk=$OUT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: andssh-${{ steps.rename.outputs.version }}
          path: ${{ steps.rename.outputs.apk }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true
